<!DOCTYPE html>
<html lang="ar" dir="rtl"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>{% block title %}{% endblock %}</title>
   
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
   
    <style>
        /* قسم التنسيق الخاص بك - يمكنك تعديل الألوان من هنا */
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
       
        /* تنسيق القائمة العلوية */
        .navbar-custom { background-color: #2c3e50; padding: 15px; }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { color: #1abc9c !important; } /* لون الرابط عند مرور الماوس */
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">💻 موقع [اسمك هنا]</a>
           
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">الرئيسية</a>
                <a class="nav-link" href="/services">خدماتي</a>
                <a class="nav-link" href="/contact">اتصل بي</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center py-4 mt-5 bg-white border-top">
        <p class="text-muted small">جميع الحقوق محفوظة © 2026 - مبرمج بايثون واعد</p>
    </footer>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
